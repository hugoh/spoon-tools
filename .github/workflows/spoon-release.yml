on:
  workflow_call:
    inputs:
      spoon_name:
        description: Spoon name (e.g. AudioPilot) — used for the zip filename
        type: string
        required: true

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          cache: false
      - name: Update version in init.lua
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION=${TAG_NAME#v}
          sed -i "s/obj.version = \"[^\"]*\"/obj.version = \"$VERSION\"/" init.lua
      - name: Package Spoon
        run: mise run package
      - name: Generate release notes
        run: git cliff --latest --strip header -o RELEASE_NOTES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          SPOON_NAME: ${{ inputs.spoon_name }}
        run: gh release create "$TAG_NAME" "${SPOON_NAME}.spoon.zip" --notes-file RELEASE_NOTES.md
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs/

  deploy-docs:
    name: Deploy docs to GitHub Pages
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
        id: deployment
