on:
  workflow_call:
    inputs:
      spoon_name:
        description: Spoon name (e.g. AudioPilot) — used for the zip filename
        type: string
        required: true

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
      - name: Update version in init.lua
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION=${TAG_NAME#v}
          sed -i "s/obj.version = \"[^\"]*\"/obj.version = \"$VERSION\"/" init.lua
      - name: Package Spoon
        run: mise run package
      - name: Generate release notes
        run: git cliff --latest --strip header -o RELEASE_NOTES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          SPOON_NAME: ${{ inputs.spoon_name }}
        run: gh release create "$TAG_NAME" "${SPOON_NAME}.spoon.zip" --notes-file RELEASE_NOTES.md
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/

  deploy-docs:
    name: Deploy docs to GitHub Pages
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        id: deployment
