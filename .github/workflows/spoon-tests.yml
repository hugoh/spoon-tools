on:
  workflow_call:
    inputs:
      pre_test:
        description: Command to run before tests (e.g. "mise run vendor")
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
      - name: Pre-test
        if: inputs.pre_test != ''
        env:
          PRE_TEST_CMD: ${{ inputs.pre_test }}
        run: $PRE_TEST_CMD
      - name: Run tests
        run: mise run test
